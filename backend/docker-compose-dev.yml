version: '3.8'

services:
  # ── Testing Edits ─────────────────────────────────────────────────────────
  edits:
    # 1. Mount your local code and testing folder into the container
    volumes:
      - ./atomic/edits:/app
      - ./testing/atomic/edits:/testing
    # 2. Force it to run pytest instead of starting the production web server
    command: >
      sh -c "pip install --no-cache-dir -r requirements-dev.txt && 
             pytest /testing"

  # ── Testing Quarantine Items ──────────────────────────────────────────────
  quarantine_items:
    volumes:
      - ./atomic/quarantine_items:/app
      - ./testing/atomic/quarantine_items:/testing
    command: >
      sh -c "pip install --no-cache-dir -r requirements-dev.txt &&
             pytest /testing"

  # ── End-to-end smoke test ─────────────────────────────────────────────────
  # Exercises the real running stack over HTTP (no mocks): content_drafts ->
  # scan_draft -> detections -> remediate_content / quarantine_high_risk.
  # Run with:
  #   docker compose -f docker-compose.yml -f docker-compose-dev.yml \
  #     up --build -d azure_db content_drafts detections edits quarantine_items \
  #     scan_draft remediate_content quarantine_high_risk
  #   docker compose -f docker-compose.yml -f docker-compose-dev.yml \
  #     run --rm smoke_test
  smoke_test:
    build: ./testing/smoke
    volumes:
      - ./testing/smoke:/service
      - draft_storage:/service/storage
    depends_on:
      content_drafts:
        condition: service_healthy
      detections:
        condition: service_healthy
      edits:
        condition: service_healthy
      quarantine_items:
        condition: service_healthy
      scan_draft:
        condition: service_healthy
      remediate_content:
        condition: service_healthy
      quarantine_high_risk:
        condition: service_healthy
    command: ["python", "run_smoke_test.py"]