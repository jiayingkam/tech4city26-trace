services:

  # ── Docs ──────────────────────────────────────────────────────────────────
  docs:
    build: ./docs
    ports:
      - "5000:5000"

  # ── Azure DB connectivity check ───────────────────────────────────────────
  azure_db:
    image: python:3.12-slim
    env_file: ../.env
    command: ["tail", "-f", "/dev/null"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,os; s=socket.socket(); s.settimeout(5); s.connect((os.environ['DB_SERVER'],1433)); s.close()\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s

  # ── Atomic services ───────────────────────────────────────────────────────
  users:
    platform: linux/amd64 # this is for apple silicon mac issue as the installation might fail w/o it.
    build: ./atomic/users
    ports:
      - "5001:5001"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy

  content_drafts:
    platform: linux/amd64
    build: ./atomic/content_drafts
    ports:
      - "5002:5002"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy

  detections:
    platform: linux/amd64
    build: ./atomic/detections
    ports:
      - "5003:5003"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  edits:
    platform: linux/amd64
    build: ./atomic/edits
    ports:
      - "5004:5004"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  exposure_profiles:
    platform: linux/amd64
    build: ./atomic/exposure_profiles
    ports:
      - "5005:5005"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy

  quarantine_items:
    platform: linux/amd64
    build: ./atomic/quarantine_items
    ports:
      - "5006:5006"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Composite services ────────────────────────────────────────────────────
  compile_family_digest:
    build: ./composite/compile_family_digest
    ports:
      - "5007:5007"

  detect_mosaic_risk:
    build: ./composite/detect_mosaic_risk
    ports:
      - "5008:5008"

  generate_teachable_moment:
    build: ./composite/generate_teachable_moment
    ports:
      - "5009:5009"
    env_file: ../.env
    depends_on:
      detections:
        condition: service_healthy
 

  quarantine_high_risk:
    build: ./composite/quarantine_high_risk
    ports:
      - "5010:5010"
    depends_on:
      detections:
        condition: service_healthy
      quarantine_items:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5010/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  remediate_content:
    build: ./composite/remediate_content
    ports:
      - "5011:5011"
    depends_on:
      detections:
        condition: service_healthy
      edits:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5011/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  scan_draft:
    build: ./composite/scan_draft
    ports:
      - "5012:5012"
    depends_on:
      detections:
        condition: service_healthy
      quarantine_high_risk:
        condition: service_healthy
      remediate_content:
        condition: service_healthy

  update_exposure_profile:
    build: ./composite/update_exposure_profile
    ports:
      - "5013:5013"
