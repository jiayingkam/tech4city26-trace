services:

  # ── Docs ──────────────────────────────────────────────────────────────────
  docs:
    build: ./docs
    ports:
      - "5000:5000"

  # ── Azure DB connectivity check ───────────────────────────────────────────
  # Runs a real login + query (not just a TCP connect) so that dependents
  # don't start against a free/serverless-tier DB that is still resuming
  # from auto-pause (Azure error 40925).
  azure_db:
    build: ./azure_db
    env_file: ../.env
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 5s

  # ── Atomic services ───────────────────────────────────────────────────────
  users:
    platform: linux/amd64 # this is for apple silicon mac issue as the installation might fail w/o it.
    build:
      context: .
      dockerfile: atomic/users/Dockerfile
    ports:
      - "5001:5001"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  content_drafts:
    platform: linux/amd64
    build:
      context: .
      dockerfile: atomic/content_drafts/Dockerfile
    ports:
      - "5002:5002"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  detections:
    platform: linux/amd64
    build:
      context: .
      dockerfile: atomic/detections/Dockerfile
    ports:
      - "5003:5003"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  edits:
    platform: linux/amd64
    build:
      context: .
      dockerfile: atomic/edits/Dockerfile
    ports:
      - "5004:5004"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  exposure_profiles:
    platform: linux/amd64
    build: ./atomic/exposure_profiles
    ports:
      - "5005:5005"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy

  quarantine_items:
    platform: linux/amd64
    build:
      context: .
      dockerfile: atomic/quarantine_items/Dockerfile
    ports:
      - "5006:5006"
    env_file: ../.env
    depends_on:
      azure_db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Composite services ────────────────────────────────────────────────────
  compile_family_digest:
    build:
      context: .
      dockerfile: composite/compile_family_digest/Dockerfile
    ports:
      - "5007:5007"
    env_file: ../.env

  detect_mosaic_risk:
    build:
      context: .
      dockerfile: composite/detect_mosaic_risk/Dockerfile
    ports:
      - "5008:5008"
    env_file: ../.env
    depends_on:
      content_drafts:
        condition: service_healthy
      detections:
        condition: service_healthy

  generate_teachable_moment:
    build:
      context: .
      dockerfile: composite/generate_teachable_moment/Dockerfile
    ports:
      - "5009:5009"
    env_file: ../.env
    depends_on:
      detections:
        condition: service_healthy
 

  quarantine_high_risk:
    build:
      context: .
      dockerfile: composite/quarantine_high_risk/Dockerfile
    ports:
      - "5010:5010"
    env_file: ../.env
    depends_on:
      detections:
        condition: service_healthy
      quarantine_items:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5010/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  remediate_content:
    build:
      context: .
      dockerfile: composite/remediate_content/Dockerfile
    ports:
      - "5011:5011"
    env_file: ../.env
    volumes:
      - draft_storage:/service/storage
    depends_on:
      content_drafts:
        condition: service_healthy
      detections:
        condition: service_healthy
      edits:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5011/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  scan_draft:
    build:
      context: .
      dockerfile: composite/scan_draft/Dockerfile
    ports:
      - "5012:5012"
    env_file: ../.env
    volumes:
      - draft_storage:/service/storage
    depends_on:
      content_drafts:
        condition: service_healthy
      detections:
        condition: service_healthy
      quarantine_high_risk:
        condition: service_healthy
      remediate_content:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5012/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  update_exposure_profile:
    build:
      context: .
      dockerfile: composite/update_exposure_profile/Dockerfile
    ports:
      - "5013:5013"
    env_file: ../.env

  upload_post:
    build:
      context: .
      dockerfile: composite/upload_post/Dockerfile
    ports:
      - "5014:5014"
    env_file: ../.env
    volumes:
      - draft_storage:/service/storage
    depends_on:
      content_drafts:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5014/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  manage_history:
    build:
      context: .
      dockerfile: composite/manage_history/Dockerfile
    ports:
      - "5015:5015"
    env_file: ../.env
    depends_on:
      content_drafts:
        condition: service_healthy
      detections:
        condition: service_healthy
      edits:
        condition: service_healthy
      quarantine_items:
        condition: service_healthy
      users:
        condition: service_healthy
      upload_post:
        condition: service_healthy
      remediate_content:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5015/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

# Shared between upload_post (writes the original file that was shared), scan_draft
# (reads the original to detect faces/GPS/etc.), and remediate_content (reads the
# original, writes the blurred/stripped output) — all three need to see the same
# file by the same relative path.
volumes:
  draft_storage:
